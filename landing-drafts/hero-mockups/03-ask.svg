<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
<defs>
 <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#c026d3"/></linearGradient>
 <radialGradient id="gl1" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#8b5cf6" stop-opacity="0.5"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/></radialGradient>
 <radialGradient id="gl2" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#c026d3" stop-opacity="0.38"/><stop offset="1" stop-color="#c026d3" stop-opacity="0"/></radialGradient>
 <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="30" stdDeviation="38" flood-color="#000000" flood-opacity="0.5"/></filter>
 <style>
  text{font-family:'Inter','Helvetica Neue',Arial,sans-serif}
 </style>
</defs>
<rect width="1280" height="800" fill="#0b0b14"/>
<circle cx="1080" cy="110" r="360" fill="url(#gl1)" opacity="0.6"/>
<circle cx="170" cy="710" r="300" fill="url(#gl2)" opacity="0.5"/>
<rect x="190" y="80" width="900" height="640" rx="18" fill="#121019" stroke="#ffffff" stroke-opacity="0.09" filter="url(#sh)"/>
<circle cx="222" cy="104" r="6" fill="#ef4444"/><circle cx="242" cy="104" r="6" fill="#f59e0b"/><circle cx="262" cy="104" r="6" fill="#22c55e"/>
<rect x="600" y="95" width="22" height="22" rx="6" fill="url(#g)"/><path d="M606 106 h10 M611 101 v10" stroke="#fff" stroke-width="1.6" stroke-linecap="round"/>
<text x="632" y="110" fill="#cbd5e1" font-size="13" font-weight="600">Ask your shop</text>
<line x1="190" y1="128" x2="1090" y2="128" stroke="#ffffff" stroke-opacity="0.07"/>
<!-- user bubble -->
<rect x="560" y="166" width="496" height="56" rx="14" fill="#7c3aed"/>
<text x="584" y="200" fill="#fff" font-size="15" font-weight="600">Which products am I losing money on right now?</text>
<!-- bot bubble -->
<rect x="224" y="252" width="640" height="362" rx="14" fill="#ffffff" fill-opacity="0.05" stroke="#ffffff" stroke-opacity="0.09"/>
<text x="252" y="292" fill="#e5e7eb" font-size="14.5" font-weight="600">Five products are priced below cost right now:</text>
<g>
 <text x="252" y="330" fill="#cbd5e1" font-size="13.5" font-weight="500">Frozen pizza, own brand</text><text x="824" y="330" text-anchor="end" fill="#ef4444" font-size="13.5" font-weight="800">-15%</text>
 <line x1="252" y1="344" x2="824" y2="344" stroke="#ffffff" stroke-opacity="0.06"/>
 <text x="252" y="372" fill="#cbd5e1" font-size="13.5" font-weight="500">Sweets multipack</text><text x="824" y="372" text-anchor="end" fill="#ef4444" font-size="13.5" font-weight="800">-8%</text>
 <line x1="252" y1="386" x2="824" y2="386" stroke="#ffffff" stroke-opacity="0.06"/>
 <text x="252" y="414" fill="#cbd5e1" font-size="13.5" font-weight="500">Batch loaf 800g</text><text x="824" y="414" text-anchor="end" fill="#ef4444" font-size="13.5" font-weight="800">-4%</text>
 <line x1="252" y1="428" x2="824" y2="428" stroke="#ffffff" stroke-opacity="0.06"/>
 <text x="252" y="456" fill="#cbd5e1" font-size="13.5" font-weight="500">Sports drink 500ml</text><text x="824" y="456" text-anchor="end" fill="#ef4444" font-size="13.5" font-weight="800">-2%</text>
 <line x1="252" y1="470" x2="824" y2="470" stroke="#ffffff" stroke-opacity="0.06"/>
 <text x="252" y="498" fill="#cbd5e1" font-size="13.5" font-weight="500">Cheddar 200g</text><text x="824" y="498" text-anchor="end" fill="#ef4444" font-size="13.5" font-weight="800">-1%</text>
</g>
<text x="252" y="544" fill="#9ca3af" font-size="13.5" font-weight="500">I can build a price-fix list for these. Just ask.</text>
<rect x="252" y="566" width="232" height="30" rx="8" fill="#7c3aed" fill-opacity="0.15" stroke="#7c3aed" stroke-opacity="0.35"/>
<circle cx="270" cy="581" r="3.5" fill="#22c55e"/><text x="282" y="585" fill="#c4b5fd" font-size="11.5" font-weight="600">Read-only &#183; answered in ~2 seconds</text>
<!-- input -->
<rect x="224" y="644" width="772" height="48" rx="12" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.08"/>
<text x="246" y="673" fill="#6b7280" font-size="13.5" font-weight="500">Ask anything about your shop...</text>
<rect x="1008" y="644" width="48" height="48" rx="12" fill="url(#g)"/><path d="M1023 668 h16 M1033 660 l8 8 l-8 8" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
