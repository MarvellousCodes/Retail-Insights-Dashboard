<rect x="344" y="356" width="46" height="264" rx="8" fill="#2c2a3d"/><text x="367" y="348" text-anchor="middle" fill="#9ca3af" font-size="11.5" font-weight="700">31</text>
<rect x="427" y="331" width="46" height="289" rx="8" fill="#2c2a3d"/><text x="450" y="323" text-anchor="middle" fill="#9ca3af" font-size="11.5" font-weight="700">34</text>
<rect x="510" y="297" width="46" height="323" rx="8" fill="url(#g)"/><text x="533" y="289" text-anchor="middle" fill="#c4b5fd" font-size="12.5" font-weight="800">38</text>
<rect x="593" y="314" width="46" height="306" rx="8" fill="#2c2a3d"/><text x="616" y="306" text-anchor="middle" fill="#9ca3af" font-size="11.5" font-weight="700">36</text>
<rect x="676" y="408" width="46" height="212" rx="8" fill="#2c2a3d"/><text x="699" y="400" text-anchor="middle" fill="#9ca3af" font-size="11.5" font-weight="700">25</text></g>
<line x1="152" y1="620" x2="744" y2="620" stroke="#ffffff" stroke-opacity="0.08"/>
<g fill="#9ca3af" font-size="11.5" font-weight="600" text-anchor="middle"><text x="201" y="642">Mon</text><text x="284" y="642">Tue</text><text x="367" y="642">Wed</text><text x="450" y="642">Thu</text><text x="533" y="642" fill="#c4b5fd" font-weight="800">Fri</text><text x="616" y="642">Sat</text><text x="699" y="642">Sun</text></g>
