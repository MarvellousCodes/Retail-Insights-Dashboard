<text x="124" y="184" fill="#fff" font-size="23" font-weight="800">Plan around your busiest times</text>
<text x="124" y="208" fill="#6b7280" font-size="12.5" font-weight="500">Staff and stock to real footfall, not a guess &#183; example shop</text>
