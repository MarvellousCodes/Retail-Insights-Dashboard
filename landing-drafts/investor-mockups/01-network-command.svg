<text x="1068" y="515" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">OK</text>

<!-- Row 4: Independents -->
<text x="150" y="560" fill="#e5e7eb" font-size="13.5" font-weight="600">Independents</text>
<text x="545" y="560" fill="#e5e7eb" font-size="13.5" font-weight="600" text-anchor="end">14</text>
<text x="820" y="560" fill="#e5e7eb" font-size="13.5" font-weight="600" text-anchor="end">&#8364;34k</text>
<rect x="1018" y="545" width="108" height="22" rx="11" fill="#f59e0b" fill-opacity="0.15"/>
<text x="1072" y="560" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">3 onboarding</text>

