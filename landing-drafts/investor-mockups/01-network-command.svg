<text x="1068" y="470" text-anchor="middle" fill="#22c55e" font-size="11" font-weight="600">OK</text>

<!-- Row 3: Group C -->
<text x="150" y="515" fill="#e5e7eb" font-size="13.5" font-weight="600">Group C</text>
<text x="545" y="515" fill="#e5e7eb" font-size="13.5" font-weight="600" text-anchor="end">34</text>
<text x="820" y="515" fill="#e5e7eb" font-size="13.5" font-weight="600" text-anchor="end">&#8364;182k</text>
