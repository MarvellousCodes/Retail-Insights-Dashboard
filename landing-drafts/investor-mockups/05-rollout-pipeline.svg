<rect x="970" y="350" width="64" height="24" rx="12" fill="rgba(124,58,237,0.16)"/><text x="1002" y="366" text-anchor="middle" fill="#c4b5fd" font-size="11">Group B</text>
<rect x="898" y="382" width="64" height="24" rx="12" fill="rgba(124,58,237,0.16)"/><text x="930" y="398" text-anchor="middle" fill="#c4b5fd" font-size="11">Group C</text>
