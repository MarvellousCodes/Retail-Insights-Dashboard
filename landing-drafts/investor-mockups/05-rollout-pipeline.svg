<rect x="220" y="350" width="56" height="24" rx="12" fill="rgba(124,58,237,0.16)"/><text x="248" y="366" text-anchor="middle" fill="#c4b5fd" font-size="11">Group D</text>
<rect x="284" y="350" width="80" height="24" rx="12" fill="rgba(124,58,237,0.16)"/><text x="324" y="366" text-anchor="middle" fill="#c4b5fd" font-size="11">Independents</text>
