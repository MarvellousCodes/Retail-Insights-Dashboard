<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
<defs>
 <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#c026d3"/></linearGradient>
 <linearGradient id="ar" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8b5cf6" stop-opacity="0.35"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/></linearGradient>
 <radialGradient id="gl1" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#8b5cf6" stop-opacity="0.55"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/></radialGradient>
 <radialGradient id="gl2" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#c026d3" stop-opacity="0.4"/><stop offset="1" stop-color="#c026d3" stop-opacity="0"/></radialGradient>
 <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="30" stdDeviation="38" flood-color="#000000" flood-opacity="0.5"/></filter>
 <style>text{font-family:'Inter','Helvetica Neue',Arial,sans-serif}</style>
</defs>
<rect width="1280" height="800" fill="#0b0b14"/>
<circle cx="1080" cy="90" r="380" fill="url(#gl1)" opacity="0.6"/>
<circle cx="150" cy="720" r="300" fill="url(#gl2)" opacity="0.5"/>
<rect x="90" y="80" width="1100" height="640" rx="18" fill="#121019" stroke="#ffffff" stroke-opacity="0.09" filter="url(#sh)"/>
<circle cx="122" cy="104" r="6" fill="#ef4444"/><circle cx="142" cy="104" r="6" fill="#f59e0b"/><circle cx="162" cy="104" r="6" fill="#22c55e"/>
<text x="640" y="109" text-anchor="middle" fill="#9ca3af" font-size="13" font-weight="600">RetailGuard / Engagement</text>
<circle cx="1098" cy="104" r="4" fill="#22c55e"/><text x="1110" y="108" fill="#22c55e" font-size="11.5" font-weight="600">Live</text>
<line x1="90" y1="128" x2="1190" y2="128" stroke="#ffffff" stroke-opacity="0.07"/>


<!-- Section title -->
<text x="124" y="178" fill="#fff" font-size="22" font-weight="800">How much they use it</text>
<text x="124" y="200" fill="#6b7280" font-size="12.5" font-weight="500">Daily habit across live stores</text>

<!-- KPI 1: QUESTIONS ASKED -->
<rect x="124" y="222" width="245" height="106" rx="12" fill="#16151f" stroke="#ffffff" stroke-opacity="0.06"/>
<text x="142" y="252" fill="#9ca3af" font-size="10.5" font-weight="700" letter-spacing="1.2">QUESTIONS ASKED</text>
<text x="142" y="290" fill="#22c55e" font-size="27" font-weight="800">14,820</text>
<text x="142" y="312" fill="#22c55e" font-size="11" font-weight="600">per month</text>

<!-- KPI 2: SPREADSHEETS BUILT -->
<rect x="383" y="222" width="245" height="106" rx="12" fill="#16151f" stroke="#ffffff" stroke-opacity="0.06"/>
<text x="401" y="252" fill="#9ca3af" font-size="10.5" font-weight="700" letter-spacing="1.2">SPREADSHEETS BUILT</text>
<text x="401" y="290" fill="#22c55e" font-size="27" font-weight="800">3,110</text>
<text x="401" y="312" fill="#22c55e" font-size="11" font-weight="600">per month</text>

<!-- KPI 3: WEEKLY ACTIVE STORES -->
<rect x="642" y="222" width="245" height="106" rx="12" fill="#16151f" stroke="#ffffff" stroke-opacity="0.06"/>
<text x="660" y="252" fill="#9ca3af" font-size="10.5" font-weight="700" letter-spacing="1.2">WEEKLY ACTIVE STORES</text>
<text x="660" y="290" fill="#22c55e" font-size="27" font-weight="800">92%</text>
<text x="660" y="312" fill="#22c55e" font-size="11" font-weight="600">of paying base</text>

<!-- KPI 4: AVG SESSIONS -->
<rect x="901" y="222" width="245" height="106" rx="12" fill="#16151f" stroke="#ffffff" stroke-opacity="0.06"/>
<text x="919" y="252" fill="#9ca3af" font-size="10.5" font-weight="700" letter-spacing="1.2">AVG SESSIONS</text>
<text x="919" y="290" fill="#ffffff" font-size="27" font-weight="800">11</text>
<text x="919" y="312" fill="#9ca3af" font-size="11" font-weight="600">per store each week</text>

<!-- Bar chart: Sessions per store per week (W1..W8) -->
<!-- Chart area: x150..1130, y370..650; height=280; baseline y=650 -->
<!-- Values: 6.2, 6.8, 7.5, 8.1, 9, 9.6, 10.4, 11 -->
<!-- Max=11, scale: barH = (val/11)*250 -->
<!-- 8 bars, barWidth=80, gap=42.5, startX = 150 + (980-8*80)/2 + ... -->
<!-- simpler: evenly space 8 bars across 980px (150..1130) -->
<!-- spacing = 980/8 = 122.5; barCenterOffset=61.25; barWidth=70 -->

<!-- Baseline -->
<line x1="150" y1="650" x2="1130" y2="650" stroke="#ffffff" stroke-opacity="0.08"/>

<!-- W1: 6.2 -> h=141 -> y=509 -->
<rect x="177" y="509" width="70" height="141" rx="8" fill="#2c2a3d"/>
<text x="212" y="499" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="600">6.2</text>
<text x="212" y="672" text-anchor="middle" fill="#6b7280" font-size="11" font-weight="600">W1</text>

<!-- W2: 6.8 -> h=155 -> y=495 -->
<rect x="299" y="495" width="70" height="155" rx="8" fill="#2c2a3d"/>
<text x="334" y="485" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="600">6.8</text>
<text x="334" y="672" text-anchor="middle" fill="#6b7280" font-size="11" font-weight="600">W2</text>

<!-- W3: 7.5 -> h=170 -> y=480 -->
<rect x="422" y="480" width="70" height="170" rx="8" fill="#2c2a3d"/>
<text x="457" y="470" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="600">7.5</text>
<text x="457" y="672" text-anchor="middle" fill="#6b7280" font-size="11" font-weight="600">W3</text>

<!-- W4: 8.1 -> h=184 -> y=466 -->
<rect x="544" y="466" width="70" height="184" rx="8" fill="#2c2a3d"/>
<text x="579" y="456" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="600">8.1</text>
<text x="579" y="672" text-anchor="middle" fill="#6b7280" font-size="11" font-weight="600">W4</text>

<!-- W5: 9 -> h=205 -> y=445 -->
<rect x="667" y="445" width="70" height="205" rx="8" fill="#2c2a3d"/>
<text x="702" y="435" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="600">9.0</text>
<text x="702" y="672" text-anchor="middle" fill="#6b7280" font-size="11" font-weight="600">W5</text>

<!-- W6: 9.6 -> h=218 -> y=432 -->
<rect x="789" y="432" width="70" height="218" rx="8" fill="#2c2a3d"/>
<text x="824" y="422" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="600">9.6</text>
<text x="824" y="672" text-anchor="middle" fill="#6b7280" font-size="11" font-weight="600">W6</text>

<!-- W7: 10.4 -> h=236 -> y=414 -->
<rect x="912" y="414" width="70" height="236" rx="8" fill="#2c2a3d"/>
<text x="947" y="404" text-anchor="middle" fill="#9ca3af" font-size="11" font-weight="600">10.4</text>
<text x="947" y="672" text-anchor="middle" fill="#6b7280" font-size="11" font-weight="600">W7</text>

<!-- W8: 11 -> h=250 -> y=400 (highlighted) -->
<rect x="1034" y="400" width="70" height="250" rx="8" fill="url(#g)"/>
<text x="1069" y="390" text-anchor="middle" fill="#e5e7eb" font-size="11" font-weight="700">11</text>
<text x="1069" y="672" text-anchor="middle" fill="#e5e7eb" font-size="11" font-weight="700">W8</text>

<!-- Y-axis label -->
<text x="150" y="365" fill="#6b7280" font-size="10.5" font-weight="600">Sessions / store / week</text>

<!-- Footer -->
<text x="1156" y="700" text-anchor="end" fill="#4b5563" font-size="10" font-weight="500">Illustrative</text>
</svg>
