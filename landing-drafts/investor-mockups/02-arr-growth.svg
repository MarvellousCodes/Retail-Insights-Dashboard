<text x="862" y="672" text-anchor="middle" fill="#6b7280" font-size="10.5">Sep</text>
<text x="951" y="672" text-anchor="middle" fill="#6b7280" font-size="10.5">Oct</text>
<text x="1041" y="672" text-anchor="middle" fill="#6b7280" font-size="10.5">Nov</text>
<text x="1130" y="672" text-anchor="middle" fill="#6b7280" font-size="10.5">Dec</text>

<!-- Footer -->
