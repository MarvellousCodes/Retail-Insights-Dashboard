<polyline points="150,583 239,566 328,549 417,532 506,510 595,488 684,471 773,448 862,432 951,415 1041,401 1130,391" fill="none" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

<!-- End circle -->
<circle cx="1130" cy="391" r="6" fill="#7c3aed" stroke="#121019" stroke-width="3"/>

