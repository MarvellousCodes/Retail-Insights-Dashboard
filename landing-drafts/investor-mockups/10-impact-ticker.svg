<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" width="1280" height="800">
<defs>
 <linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7c3aed"/><stop offset="1" stop-color="#c026d3"/></linearGradient>
 <linearGradient id="ar" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8b5cf6" stop-opacity="0.35"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/></linearGradient>
 <radialGradient id="gl1" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#8b5cf6" stop-opacity="0.55"/><stop offset="1" stop-color="#8b5cf6" stop-opacity="0"/></radialGradient>
 <radialGradient id="gl2" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#c026d3" stop-opacity="0.4"/><stop offset="1" stop-color="#c026d3" stop-opacity="0"/></radialGradient>
 <filter id="sh" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="30" stdDeviation="38" flood-color="#000000" flood-opacity="0.5"/></filter>
 <style>text{font-family:'Inter','Helvetica Neue',Arial,sans-serif}</style>
</defs>
<rect width="1280" height="800" fill="#0b0b14"/>
<circle cx="1080" cy="90" r="380" fill="url(#gl1)" opacity="0.6"/>
<circle cx="150" cy="720" r="300" fill="url(#gl2)" opacity="0.5"/>
<rect x="90" y="80" width="1100" height="640" rx="18" fill="#121019" stroke="#ffffff" stroke-opacity="0.09" filter="url(#sh)"/>
<circle cx="122" cy="104" r="6" fill="#ef4444"/><circle cx="142" cy="104" r="6" fill="#f59e0b"/><circle cx="162" cy="104" r="6" fill="#22c55e"/>
<text x="640" y="109" text-anchor="middle" fill="#9ca3af" font-size="13" font-weight="600">RetailGuard / Live</text>
<circle cx="1098" cy="104" r="4" fill="#22c55e"/><text x="1110" y="108" fill="#22c55e" font-size="11.5" font-weight="600">Live</text>
<line x1="90" y1="128" x2="1190" y2="128" stroke="#ffffff" stroke-opacity="0.07"/>

  <!-- Title -->
  <text x="124" y="170" fill="#ffffff" font-size="20" font-weight="700">Money found today</text>
  <text x="124" y="194" fill="#6b7280" font-size="13">Live across 240 stores</text>
  <!-- Big number -->
  <text x="124" y="300" fill="url(#g)" font-size="48" font-weight="900">&#8364;4,210</text>
  <text x="124" y="330" fill="#6b7280" font-size="13">found today, and counting</text>
  <!-- Feed list -->
  <!-- Row 1 -->
  <circle cx="130" cy="395" r="5" fill="#22c55e"/>
  <text x="150" y="400" fill="#ffffff" font-size="14" font-weight="600">Store 128 &#183; pizza line repriced</text>
  <text x="1130" y="400" text-anchor="end" fill="#22c55e" font-size="14" font-weight="700">+&#8364;34/wk</text>
  <line x1="124" y1="420" x2="1156" y2="420" stroke="#ffffff" stroke-opacity="0.04"/>
  <!-- Row 2 -->
  <circle cx="130" cy="445" r="5" fill="#f59e0b"/>
  <text x="150" y="450" fill="#ffffff" font-size="14" font-weight="600">Store 044 &#183; supplier cost rise caught</text>
  <text x="1130" y="450" text-anchor="end" fill="#f59e0b" font-size="14" font-weight="700">+&#8364;0.07/unit</text>
  <line x1="124" y1="470" x2="1156" y2="470" stroke="#ffffff" stroke-opacity="0.04"/>
  <!-- Row 3 -->
  <circle cx="130" cy="495" r="5" fill="#22c55e"/>
  <text x="150" y="500" fill="#ffffff" font-size="14" font-weight="600">Store 211 &#183; below-cost item flagged</text>
  <text x="1130" y="500" text-anchor="end" fill="#22c55e" font-size="14" font-weight="700">+&#8364;18/wk</text>
  <line x1="124" y1="520" x2="1156" y2="520" stroke="#ffffff" stroke-opacity="0.04"/>
  <!-- Row 4 -->
  <circle cx="130" cy="545" r="5" fill="#22c55e"/>
  <text x="150" y="550" fill="#ffffff" font-size="14" font-weight="600">Store 087 &#183; bakery margin restored</text>
  <text x="1130" y="550" text-anchor="end" fill="#22c55e" font-size="14" font-weight="700">+&#8364;22/wk</text>
  <line x1="124" y1="570" x2="1156" y2="570" stroke="#ffffff" stroke-opacity="0.04"/>
  <!-- Row 5 -->
  <circle cx="130" cy="595" r="5" fill="#f59e0b"/>
  <text x="150" y="600" fill="#ffffff" font-size="14" font-weight="600">Store 159 &#183; invoice scanned, 3 rises</text>
  <text x="1130" y="600" text-anchor="end" fill="#f59e0b" font-size="14" font-weight="700">+&#8364;41/wk</text>
  <!-- Footer -->
  <text x="1156" y="700" text-anchor="end" fill="#4b5563" font-size="10">Illustrative</text>
</svg>
